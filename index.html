<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青海农信 · 智能识别系统</title>
    <style>
        :root {
            --brand-50: #E8F0FB;
            --brand-100: #D1DFF4;
            --brand-300: #6E97D6;
            --brand-500: #2A66C2;
            --brand-700: #143F8F;
            --brand-900: #01256A;
            --green-50: #ECFDF5;
            --green-500: #10B981;
            --green-700: #047857;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --success-border: #A7F3D0;
            --warning: #D97706;
            --warning-bg: #FFFBEB;
            --warning-border: #FDE68A;
            --danger: #DC2626;
            --danger-bg: #FEF2F2;
            --danger-border: #FECACA;
            --info: #2A66C2;
            --info-bg: #E8F0FB;
            --info-border: #D1DFF4;
            --ink-900: #0F172A;
            --ink-800: #1E293B;
            --ink-600: #475569;
            --ink-500: #64748B;
            --ink-400: #94A3B8;
            --ink-300: #CBD5E1;
            --line-200: #E2E8F0;
            --bg-muted: #F1F5F9;
            --bg-subtle: #F8FAFC;
            --white: #FFFFFF;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            --radius-full: 9999px;
            --shadow-xs: 0 1px 2px rgba(15, 23, 42, .04);
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, .06), 0 1px 2px rgba(15, 23, 42, .04);
            --shadow-md: 0 4px 12px rgba(15, 23, 42, .08), 0 2px 4px rgba(15, 23, 42, .04);
            --s-1: 4px;
            --s-2: 8px;
            --s-3: 12px;
            --s-4: 16px;
            --s-5: 20px;
            --s-6: 24px;
            --s-8: 32px;
            --font-sans: 'PingFang SC', 'Microsoft YaHei', 'Inter', system-ui, sans-serif;
            --font-num: 'Inter', 'SF Pro Display', system-ui, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            color: var(--ink-800);
            background: var(--bg-subtle);
            font-size: 14px;
            line-height: 1.57;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        html {
            height: 100%;
        }

        /* ===== 顶部导航 ===== */
        .topbar {
            height: 54px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
            background: var(--white);
            border-bottom: 1px solid var(--line-200);
            flex-shrink: 0;
            z-index: 10;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 232px;
            flex-shrink: 0;
            background: var(--white);
            border-right: 1px solid var(--line-200);
            display: flex;
            flex-direction: column;
            transition: width .25s ease;
            overflow: hidden;
        }
        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
        }
        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: var(--brand-500);
        }

        /* ===== 菜单样式 ===== */
        .menu-l1 {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            font-size: 13px;
            color: #334155;
            cursor: pointer;
            border-radius: 8px;
            margin: 0 8px 2px;
            transition: all .2s;
            background: var(--bg-subtle);
            user-select: none;
        }
        .menu-l1:hover {
            background: #EEF2F7;
            color: var(--brand-500);
        }
        .menu-l1.active {
            background: var(--brand-50);
            color: var(--brand-700);
            font-weight: 600;
        }
        .menu-l1.open .l1-arrow {
            transform: rotate(90deg);
            color: var(--brand-500);
        }
        .menu-l1 .l1-arrow {
            width: 13px;
            height: 13px;
            transition: transform .3s;
            color: var(--ink-400);
            flex-shrink: 0;
            margin-left: auto;
        }
        .menu-l1 .menu-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--ink-400);
        }
        .menu-l1:hover .menu-icon {
            color: var(--brand-500);
        }

        .submenu {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height .35s, opacity .25s;
            position: relative;
            margin: 0 8px;
        }
        .menu-l1.open+.submenu {
            max-height: 600px;
            opacity: 1;
            margin: 2px 8px 6px;
        }
        .submenu::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 4px;
            bottom: 4px;
            width: 1px;
            background: var(--line-200);
        }

        .menu-l2 {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px 6px 34px;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
            border-radius: 6px;
            margin: 2px 0;
            transition: all .2s;
            position: relative;
        }
        .menu-l2:hover {
            background: var(--bg-muted);
            color: var(--brand-500);
        }
        .menu-l2.active {
            background: var(--brand-50);
            color: var(--brand-700);
            font-weight: 500;
        }
        .menu-l2.active::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--brand-700);
        }
        .menu-l2 .l2-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            color: var(--ink-400);
        }
        .menu-l2:hover .l2-icon {
            color: var(--brand-500);
        }

        .menu-divider {
            height: 1px;
            background: var(--line-200);
            margin: 8px 16px;
        }

        /* ===== 内容区 ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-subtle);
        }

        /* ===== 标签栏 ===== */
        .tab-bar {
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            background: var(--white);
            border-bottom: 1px solid var(--line-200);
            flex-shrink: 0;
        }
        .tab-bar-inner {
            display: flex;
            align-items: center;
            gap: 0;
            flex: 1;
            overflow-x: auto;
            height: 100%;
        }
        .page-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 14px;
            height: 100%;
            font-size: 12px;
            color: var(--ink-500);
            cursor: pointer;
            position: relative;
            transition: all .2s;
            white-space: nowrap;
            user-select: none;
            flex-shrink: 0;
        }
        .page-tab:hover {
            color: var(--brand-500);
        }
        .page-tab.active {
            color: var(--brand-500);
            font-weight: 500;
        }
        .page-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 12px;
            right: 12px;
            height: 2px;
            background: var(--brand-500);
            border-radius: 2px 2px 0 0;
        }
        .page-tab .tab-close {
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
            opacity: 0;
            transition: all .15s;
            flex-shrink: 0;
        }
        .page-tab:hover .tab-close {
            opacity: .4;
        }
        .page-tab .tab-close:hover {
            opacity: 1;
            background: var(--line-200);
        }

        /* ===== iframe 容器 ===== */
        .iframe-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .iframe-container iframe.active {
            display: block;
        }

        /* ===== 侧边栏折叠按钮 ===== */
        .sidebar-toggle {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: var(--radius-md);
            color: var(--ink-400);
            transition: all .2s;
            flex-shrink: 0;
            margin: 0 4px;
        }
        .sidebar-toggle:hover {
            background: var(--bg-muted);
            color: var(--brand-500);
        }

        /* ===== 动画 ===== */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--line-200);
            border-top-color: var(--brand-500);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        .leaf-sway {
            animation: leaf-sway 3.5s ease-in-out infinite;
            transform-origin: 50% 90%;
        }
        @keyframes leaf-sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }
        @keyframes breathe {
            0%, 100% { opacity: .4; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.08); }
        }
        .breathe {
            animation: breathe 4s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-text {
            background: linear-gradient(90deg, var(--brand-900) 0%, var(--brand-500) 40%, var(--green-500) 60%, var(--brand-900) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 6s linear infinite;
        }
    </style>
</head>
<body>

    <!-- ===== 顶部导航 ===== -->
    <header class="topbar">
        <div class="sidebar-toggle" onclick="toggleSidebar()" title="收起/展开菜单">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <div class="relative" style="position:relative;">
                <div class="absolute inset-0 rounded-lg breathe" style="background:radial-gradient(circle,rgba(16,185,129,.25) 0%,transparent 70%);filter:blur(8px);"></div>
                <div style="position:relative;width:30px;height:30px;border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--brand-900) 0%,var(--brand-500) 100%);">
                    <svg class="w-4 h-4 text-white leaf-sway" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
                        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                    </svg>
                </div>
            </div>
            <div>
                <div class="shimmer-text" style="font-size:17px;font-weight:700;white-space:nowrap;">青海农信 · 智能识别系统</div>
            </div>
        </div>
        <div style="width:1px;height:22px;background:var(--line-200);"></div>
        <span style="padding:5px 10px;font-size:12px;color:var(--brand-700);font-weight:600;background:var(--brand-50);border-radius:20px;">识农·识绿</span>
        <div style="flex:1;"></div>
        <span style="font-size:12px;color:var(--ink-500);">系统管理员</span>
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--brand-500) 0%,var(--brand-900) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;">李</div>
    </header>

    <!-- ===== 主体 ===== -->
    <div style="display:flex;flex:1;overflow:hidden;min-height:0;">

        <!-- 侧边栏 -->
        <aside class="sidebar custom-scroll" id="sidebar">
            <div class="sidebar-scroll" id="sidebarScroll"></div>
        </aside>

        <!-- 内容区 -->
        <main class="content-area">
            <!-- 标签栏 -->
            <div class="tab-bar">
                <div class="tab-bar-inner custom-scroll" id="tabBar"></div>
            </div>
            <!-- iframe 容器 -->
            <div class="iframe-container" id="iframeContainer">
                <!-- 欢迎页 -->
                <div id="welcomePage" style="display:flex;align-items:center;justify-content:center;height:100%;">
                    <div style="text-align:center;">
                        <div style="font-size:48px;margin-bottom:16px;">🌿</div>
                        <div style="font-size:18px;font-weight:600;color:var(--ink-800);margin-bottom:8px;">青海农信 · 智能识别系统</div>
                        <div style="font-size:13px;color:var(--ink-500);line-height:1.8;">请从左侧菜单选择功能模块<br/>支持多标签页同时打开</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ==================== SVG 图标 ====================
        var icons = {
            chart: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 15l4-4 3 3 5-6"/></svg>',
            scan: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M8 2v20M16 2v20M2 8h20M2 16h20M9 9h6v6H9z"/></svg>',
            location: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 11 8 11s8-5.6 8-11a8 8 0 0 0-8-8z"/></svg>',
            system: '<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>'
        };

        // ==================== 菜单配置 ====================
        var menuConfig = [{
            type: 'l1',
            id: 'loan-analysis',
            label: '贷款识别业务分析',
            icon: 'chart',
            children: [
                { type: 'l2', id: 'loan-data-analysis', label: '贷款识别数据分析', file: '01loan-business-analysis/贷款识别数据分析.html' }
            ]
        }, {
            type: 'l1',
            id: 'loan-identify',
            label: '涉农涉绿业务管理',
            icon: 'scan',
            children: [
                { type: 'l2', id: 'loan-identify-list', label: '贷款智能识别', file: '02loan-smart-identify/贷款智能识别列表.html' }
            ]
        }, {
            type: 'l1',
            id: 'local-features',
            label: '贷款识别政策知识库',
            icon: 'location',
            children: [
                { type: 'l2', id: 'local-cert', label: '地方特色证书维护', file: '03local-features/地方特色证书维护.html' },
                { type: 'l2', id: 'customer-cert', label: '客户特色证书维护', file: '03local-features/客户特色证书维护.html' },
                { type: 'l2', id: 'qinghai-industry', label: '青海特色产业维护', file: '03local-features/青海特色产业维护.html' }
            ]
        }, {
            type: 'l1',
            id: 'system-mgmt',
            label: '系统管理',
            icon: 'system',
            children: [
                { type: 'l2', id: 'org-mgmt', label: '机构管理', file: '04system-management/机构管理-机构树.html' },
                { type: 'l2', id: 'user-mgmt', label: '用户管理', file: '04system-management/用户管理-用户列表.html' },
                { type: 'l2', id: 'role-mgmt', label: '角色管理', file: '04system-management/角色管理-角色列表.html' },
                { type: 'l2', id: 'dict-mgmt', label: '数据字典', file: '04system-management/数据字典-字典管理.html' },
                { type: 'l2', id: 'op-log', label: '操作日志', file: '04system-management/操作日志列表.html' }
            ]
        }];

        // ==================== 渲染侧边栏 ====================
        (function buildSidebar() {
            var html = '';
            menuConfig.forEach(function(section) {
                html += '<div class="menu-l1" onclick="toggleMenu(this)" data-menu="' + section.id + '">';
                html += (icons[section.icon] || '') + '<span>' + section.label + '</span>';
                html += '<svg class="l1-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
                html += '</div><div class="submenu">';
                section.children.forEach(function(item) {
                    html += '<div class="menu-l2" data-page="' + item.id + '" data-file="' + item.file + '" data-label="' + item.label + '" onclick="openPage(this)">' + item.label + '</div>';
                });
                html += '</div>';
            });
            document.getElementById('sidebarScroll').innerHTML = html;
        })();

        // ==================== Tab 管理 ====================
        var openTabs = [];
        var activeTabId = null;
        var tabIframes = {};

        function openPage(menuEl) {
            var pageId = menuEl.dataset.page;
            var file = menuEl.dataset.file;
            var label = menuEl.dataset.label;

            // 更新侧边栏高亮
            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            menuEl.classList.add('active');

            // 展开上级菜单
            var l1 = menuEl.closest('.submenu').previousElementSibling;
            if (l1 && !l1.classList.contains('open')) {
                l1.classList.add('open');
            }

            // 检查是否已打开
            var existing = openTabs.find(function(t) { return t.id === pageId; });
            if (existing) {
                switchTab(pageId);
                return;
            }

            // 创建新 tab
            var tab = { id: pageId, label: label, file: file };
            openTabs.push(tab);
            activeTabId = pageId;

            // 创建 iframe
            var iframe = document.createElement('iframe');
            iframe.src = file;
            iframe.id = 'iframe-' + pageId;
            iframe.classList.add('active');
            tabIframes[pageId] = iframe;

            // 隐藏其他 iframe
            Object.keys(tabIframes).forEach(function(id) {
                if (id !== pageId) tabIframes[id].classList.remove('active');
            });
            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('iframeContainer').appendChild(iframe);

            renderTabs();
        }

        function switchTab(pageId) {
            if (activeTabId === pageId) return;
            activeTabId = pageId;

            // 切换 iframe 可见性
            Object.keys(tabIframes).forEach(function(id) {
                tabIframes[id].classList.toggle('active', id === pageId);
            });

            // 更新侧边栏高亮
            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            var menuEl = document.querySelector('[data-page="' + pageId + '"]');
            if (menuEl) menuEl.classList.add('active');

            renderTabs();
        }

        function closeTab(pageId, e) {
            e.stopPropagation();
            var idx = openTabs.findIndex(function(t) { return t.id === pageId; });
            if (idx === -1) return;

            // 移除 iframe
            var iframe = tabIframes[pageId];
            if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
            delete tabIframes[pageId];

            // 移除 tab
            openTabs.splice(idx, 1);

            // 如果关闭的是当前 tab，切换到相邻 tab
            if (activeTabId === pageId) {
                if (openTabs.length > 0) {
                    var next = openTabs[Math.min(idx, openTabs.length - 1)];
                    activeTabId = next.id;
                    var nextIframe = tabIframes[activeTabId];
                    if (nextIframe) nextIframe.classList.add('active');
                } else {
                    activeTabId = null;
                    document.getElementById('welcomePage').style.display = 'flex';
                }
            }

            // 更新侧边栏高亮
            document.querySelectorAll('.menu-l2').forEach(function(m) { m.classList.remove('active'); });
            if (activeTabId) {
                var menuEl = document.querySelector('[data-page="' + activeTabId + '"]');
                if (menuEl) menuEl.classList.add('active');
            }

            renderTabs();
        }

        function renderTabs() {
            var tabBar = document.getElementById('tabBar');
            var html = '';
            openTabs.forEach(function(tab) {
                var isActive = tab.id === activeTabId;
                html += '<div class="page-tab' + (isActive ? ' active' : '') + '" onclick="switchTab(\'' + tab.id + '\')" title="' + tab.label + '">';
                html += '<span>' + tab.label + '</span>';
                html += '<span class="tab-close" onclick="closeTab(\'' + tab.id + '\',event)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></span>';
                html += '</div>';
            });
            tabBar.innerHTML = html;
        }

        // ==================== 菜单折叠 ====================
        function toggleMenu(el) {
            var wasOpen = el.classList.contains('open');
            var allL1 = document.querySelectorAll('.menu-l1');
            allL1.forEach(function(m) {
                if (m !== el) m.classList.remove('open');
            });
            if (wasOpen) {
                el.classList.remove('open');
            } else {
                el.classList.add('open');
            }
        }

        // ==================== 侧边栏收起 ====================
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        // ==================== 默认展开第一个菜单 ====================
        (function() {
            var firstL1 = document.querySelector('.menu-l1');
            if (firstL1) firstL1.classList.add('open');
        })();

        // ==================== 监听子页面消息 ====================
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'openPage') {
                var pageId = e.data.pageId;
                var file = e.data.file;
                var label = e.data.label;
                var menuEl = document.querySelector('[data-page="' + pageId + '"]');
                if (menuEl) {
                    openPage(menuEl);
                } else {
                    openPageDirect(pageId, file, label);
                }
                return;
            }
            if (e.data && e.data.type === 'resize' && e.data.height) {
                Object.keys(tabIframes).forEach(function(id) {
                    var f = tabIframes[id];
                    if (f && f.classList.contains('active') && f.contentWindow === e.source) {
                        f.style.height = e.data.height + 'px';
                    }
                });
            }
        });

        function openPageDirect(pageId, file, label) {
            var existing = openTabs.find(function(t) { return t.id === pageId; });
            if (existing) { switchTab(pageId); return; }
            var tab = { id: pageId, label: label, file: file };
            openTabs.push(tab);
            activeTabId = pageId;
            var iframe = document.createElement('iframe');
            iframe.src = file;
            iframe.id = 'iframe-' + pageId;
            iframe.classList.add('active');
            tabIframes[pageId] = iframe;
            Object.keys(tabIframes).forEach(function(id) {
                if (id !== pageId) tabIframes[id].classList.remove('active');
            });
            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('iframeContainer').appendChild(iframe);
            renderTabs();
        }
    </script>

</body>
</html>
